---
name: Graphical Settings
id: modules.graphical
flake: xinux-modules
unique_groups:
  - graphical
description: "Setup graphical settings and graphic card drivers."
version: 0.0.1
icon:
  type: system
  path: com.leinardi.gwe-symbolic

options:
  - label: "Graphic Card"
    id: modules.graphical.graphical
    description: "Select your graphic card vendor."
    type: !enum
      default: '"default"'
      options:
        '"nvidia"': "NVIDIA Graphics Card"
        '"amdgpu"': "AMD Graphics Card"
        '"intel"': "Intel internal GPU"
        '"default"': "Default settings"
