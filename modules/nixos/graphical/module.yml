---
name: Graphical Settings
id: modules.graphical
flake: xinux-modules
unique_groups:
  - graphical
description: "Setup graphical settings and graphic card drivers."
version: 0.0.1
icon:
  type: system
  path: com.leinardi.gwe-symbolic

options:
  - label: "Graphic Card"
    id: modules.graphical.gpu
    description: "Select your graphic card vendor."
    type: !options
      default: []
      options:
        '"nvidia"': "NVIDIA Graphics"
        '"amdgpu"': "AMD Graphics"

  - label: "NVIDIA Series"
    id: modules.graphical.nvidia
    description: ""
    if: "includes('modules.graphical.gpu', 'nvidia')"
    type: !enum
      default: "latest"
      options:
        '"nvidia-2060"': "NVIDIA 2060"
